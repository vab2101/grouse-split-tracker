<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#161b17">
  <title>Mockup A — Topo Background · BCMC Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="stylesheet" href="./_shared.css">
</head>
<body>
  <div class="phone"></div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="./_shared.js"></script>
  <script>
    const mapEl = renderChrome({
      nextMarker: 3,
      progress: 0.30,
      attribution: 'Map © <b>OpenTopoMap</b> (CC-BY-SA) · © OpenStreetMap contributors'
    });

    const style = {
      version: 8,
      sources: {
        topo: {
          type: 'raster',
          tiles: [
            'https://a.tile.opentopomap.org/{z}/{x}/{y}.png',
            'https://b.tile.opentopomap.org/{z}/{x}/{y}.png',
            'https://c.tile.opentopomap.org/{z}/{x}/{y}.png'
          ],
          tileSize: 256,
          maxzoom: 17,
          attribution: '© OpenTopoMap (CC-BY-SA) © OpenStreetMap contributors'
        }
      },
      layers: [
        { id: 'bg', type: 'background', paint: { 'background-color': '#1a1e1b' } },
        { id: 'topo', type: 'raster', source: 'topo',
          paint: {
            // Slightly dim + desaturate so the dark UI chrome still reads clearly.
            'raster-brightness-min': 0.05,
            'raster-brightness-max': 0.78,
            'raster-saturation': -0.35,
            'raster-contrast': 0.08,
            'raster-opacity': 0.95
          }
        }
      ]
    };

    const map = new maplibregl.Map({
      container: mapEl,
      style,
      interactive: false,
      attributionControl: false,
      dragRotate: false,
      pitchWithRotate: false,
      touchZoomRotate: false
    });

    map.on('load', () => {
      map.addSource('trail', {
        type: 'geojson',
        data: {
          type: 'Feature',
          properties: {},
          geometry: {
            type: 'LineString',
            coordinates: TRAIL.map(p => [p[1], p[0]])
          }
        }
      });

      // Outer glow (soft halo)
      map.addLayer({
        id: 'trail-glow',
        type: 'line',
        source: 'trail',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': 'hsl(145, 70%, 55%)',
          'line-width': 10,
          'line-opacity': 0.25,
          'line-blur': 4
        }
      });
      // Crisp core line
      map.addLayer({
        id: 'trail-core',
        type: 'line',
        source: 'trail',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': 'hsl(145, 80%, 65%)',
          'line-width': 3,
          'line-opacity': 0.95
        }
      });

      // Start marker + current-position pulse
      const start = TRAIL[0];
      const curIdx = Math.floor(0.30 * (TRAIL.length - 1));
      const cur = TRAIL[curIdx];
      const startEl = document.createElement('div');
      startEl.className = 'trail-start';
      new maplibregl.Marker({ element: startEl, anchor: 'center' })
        .setLngLat([start[1], start[0]]).addTo(map);
      const curEl = document.createElement('div');
      curEl.className = 'trail-pulse';
      new maplibregl.Marker({ element: curEl, anchor: 'center' })
        .setLngLat([cur[1], cur[0]]).addTo(map);

      // Fit trail bounds with heavy BOTTOM padding so the trail lives in the upper
      // portion of the map area — leaves the vertical center empty for the marker button.
      map.fitBounds(TRAIL_BOUNDS, {
        padding: { top: 30, right: 40, bottom: 260, left: 40 },
        animate: false,
        duration: 0
      });
    });

    // Re-fit on resize so the button "safe zone" stays clear
    window.addEventListener('resize', () => {
      map.resize();
      map.fitBounds(TRAIL_BOUNDS, {
        padding: { top: 30, right: 40, bottom: 260, left: 40 },
        animate: false,
        duration: 0
      });
    });
  </script>
</body>
</html>
