<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Grouse Split Tracker">
  <!-- Rounded tile, app background -->
  <rect width="512" height="512" rx="96" fill="#131A16"/>

  <!-- Crown assembly: narrow neck welded to the ring, wider head on top.
       Ring top edge is at y=120 (cy=306 - r=186). Neck spans y=86..132 so it
       overlaps the ring by ~12px, visually fusing with it. Head sits on neck. -->
  <rect x="244" y="86"  width="24" height="46" rx="4"  fill="#ED9A38"/>
  <rect x="220" y="48"  width="72" height="48" rx="12" fill="#ED9A38"/>

  <!-- Stopwatch body (thick orange ring) -->
  <circle cx="256" cy="306" r="186" fill="#ED9A38"/>
  <!-- Dial inset, same as tile -->
  <circle cx="256" cy="306" r="156" fill="#131A16"/>

  <!-- Mountain peaks clipped to dial -->
  <defs>
    <clipPath id="dial">
      <circle cx="256" cy="306" r="156"/>
    </clipPath>
  </defs>
  <g clip-path="url(#dial)">
    <!-- Back peak (deeper green) -->
    <path d="M 96 466 L 230 306 L 298 384 L 334 348 L 428 466 Z" fill="#1E6B3E"/>
    <!-- Front peak (app primary green) -->
    <path d="M 76 466 L 256 286 L 420 466 Z" fill="#2FB86A"/>
    <!-- Snow cap -->
    <path d="M 240 314 L 256 286 L 272 314 L 264 322 L 256 316 L 248 322 Z" fill="#F3EEDE"/>
  </g>

  <!-- Stopwatch hand: pivot at dial center, straight up through summit to ~12. -->
  <!-- Long enough to read clearly at 16px, cream contrasts on both green and dark. -->
  <rect x="251.5" y="168" width="9" height="144" rx="4.5" fill="#F3EEDE"/>

  <!-- Pivot cap -->
  <circle cx="256" cy="306" r="14" fill="#F3EEDE"/>
  <circle cx="256" cy="306" r="6"  fill="#ED9A38"/>
</svg>
