<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Grouse Split Tracker">
  <!-- Dark rounded tile (app background, hsl 150 10% 8%) -->
  <rect width="512" height="512" rx="96" fill="#131A16"/>

  <!-- Mountain outline: Lucide "Mountain" path, scaled 20x to 512 space.
       Original 24-unit coords: (8,3) (12,11) (17,6) (22,21) (2,21) close. -->
  <path d="M 176 76 L 256 236 L 356 136 L 456 436 L 56 436 Z"
        fill="none" stroke="#2FB86A" stroke-width="22"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Crown assembly (drawn after mountain so it covers the valley-point pinch).
       The stem + head sit in the V-notch between the two peaks and weld into
       the ring top below. -->
  <!-- Crown head (wider) -->
  <rect x="230" y="160" width="52" height="46" rx="10" fill="#ED9A38"/>
  <!-- Crown stem/neck (narrower) -->
  <rect x="244" y="198" width="24" height="48" rx="6"  fill="#ED9A38"/>
  <!-- Small top cap -->
  <rect x="246" y="140" width="20" height="24" rx="5"  fill="#ED9A38"/>

  <!-- Two side pushers: pill-shaped chronograph buttons at 10 and 2 o'clock,
       oriented radially so they appear to push into the ring. -->
  <g transform="translate(156 278) rotate(210)">
    <rect x="-16" y="-8" width="32" height="16" rx="8" fill="#ED9A38"/>
  </g>
  <g transform="translate(356 278) rotate(-30)">
    <rect x="-16" y="-8" width="32" height="16" rx="8" fill="#ED9A38"/>
  </g>

  <!-- Stopwatch body: outer orange ring + dark inner dial -->
  <circle cx="256" cy="336" r="100" fill="#ED9A38"/>
  <circle cx="256" cy="336" r="84"  fill="#131A16"/>

  <!-- Three hands radiating from the pivot (chronograph layout).
       Hour: short + thick, 2 o'clock.
       Minute: medium, 10 o'clock.
       Chrono-sweep: long + thin, straight up toward the summit. -->
  <line x1="256" y1="336" x2="293" y2="315"
        stroke="#F3EEDE" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="336" x2="204" y2="306"
        stroke="#F3EEDE" stroke-width="7"  stroke-linecap="round"/>
  <line x1="256" y1="336" x2="256" y2="264"
        stroke="#F3EEDE" stroke-width="4"  stroke-linecap="round"/>

  <!-- Pivot cap -->
  <circle cx="256" cy="336" r="11" fill="#F3EEDE"/>
  <circle cx="256" cy="336" r="5"  fill="#ED9A38"/>
</svg>
